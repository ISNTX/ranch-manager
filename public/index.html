<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ranch Manager</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 1rem;
      background-color: #f5f5f5;
    }
    h1 {
      text-align: center;
    }
    section {
      background: #fff;
      margin-bottom: 2rem;
      padding: 1rem;
      border-radius: 5px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
    }
    input, textarea, select {
      width: 100%;
      padding: 0.5rem;
      margin-top: 0.25rem;
      margin-bottom: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button.voice-btn {
      margin-left: 0.5rem;
      padding: 0.4rem 0.6rem;
      font-size: 0.9rem;
    }
    .submit-btn {
      display: inline-block;
      padding: 0.6rem 1.2rem;
      background: #4CAF50;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #message {
      padding: 0.5rem;
      color: #333;
    }
  </style>
</head>
<body>
  <h1>Ranch Manager</h1>

  <section id="add-animal">
    <h2>Add Animal</h2>
    <form id="animalForm">
      <label>
        Tag
        <input type="text" id="animal-tag" required />
        <button class="voice-btn" type="button" onclick="startVoice('animal-tag')">🎤</button>
      </label>
      <label>
        Sex
        <select id="animal-sex" required>
          <option value="">Select</option>
          <option value="M">Male</option>
          <option value="F">Female</option>
        </select>
      </label>
      <label>
        Date of Birth
        <input type="date" id="animal-dob" required />
      </label>
      <label>
        Birth Weight
        <input type="number" step="0.01" id="animal-birth-weight" />
        <button class="voice-btn" type="button" onclick="startVoice('animal-birth-weight')">🎤</button>
      </label>
      <label>
        Mother ID
        <input type="text" id="animal-mother-id" />
        <button class="voice-btn" type="button" onclick="startVoice('animal-mother-id')">🎤</button>
      </label>
      <label>
        Father ID
        <input type="text" id="animal-father-id" />
        <button class="voice-btn" type="button" onclick="startVoice('animal-father-id')">🎤</button>
      </label>
      <label>
        Bloodline
        <input type="text" id="animal-bloodline" />
        <button class="voice-btn" type="button" onclick="startVoice('animal-bloodline')">🎤</button>
      </label>
      <label>
        Pen
        <input type="text" id="animal-pen" />
        <button class="voice-btn" type="button" onclick="startVoice('animal-pen')">🎤</button>
      </label>
      <label>
        Notes
        <textarea id="animal-notes" rows="3"></textarea>
        <button class="voice-btn" type="button" onclick="startVoice('animal-notes')">🎤</button>
      </label>
      <button class="submit-btn" type="submit">Submit Animal</button>
    </form>
  </section>

  <section id="record-birth">
    <h2>Record Birth</h2>
    <form id="birthForm">
      <label>
        Animal ID
        <input type="number" id="birth-animal-id" required />
        <button class="voice-btn" type="button" onclick="startVoice('birth-animal-id')">🎤</button>
      </label>
      <label>
        Birth Date
        <input type="datetime-local" id="birth-date" required />
      </label>
      <label>
        Location
        <input type="text" id="birth-location" />
        <button class="voice-btn" type="button" onclick="startVoice('birth-location')">🎤</button>
      </label>
      <label>
        Assisted Birth
        <select id="birth-assisted">
          <option value="false">No</option>
          <option value="true">Yes</option>
        </select>
      </label>
      <label>
        Complications
        <textarea id="birth-complications" rows="2"></textarea>
        <button class="voice-btn" type="button" onclick="startVoice('birth-complications')">🎤</button>
      </label>
      <button class="submit-btn" type="submit">Record Birth</button>
    </form>
  </section>

  <section id="record-weight">
    <h2>Record Weight</h2>
    <form id="weightForm">
      <label>
        Animal ID
        <input type="number" id="weight-animal-id" required />
        <button class="voice-btn" type="button" onclick="startVoice('weight-animal-id')">🎤</button>
      </label>
      <label>
        Weight
        <input type="number" step="0.01" id="weight-value" required />
        <button class="voice-btn" type="button" onclick="startVoice('weight-value')">🎤</button>
      </label>
      <label>
        Recorded At
        <input type="datetime-local" id="weight-recorded-at" />
      </label>
      <label>
        Method
        <input type="text" id="weight-method" />
        <button class="voice-btn" type="button" onclick="startVoice('weight-method')">🎤</button>
      </label>
      <label>
        Notes
        <textarea id="weight-notes" rows="2"></textarea>
        <button class="voice-btn" type="button" onclick="startVoice('weight-notes')">🎤</button>
      </label>
      <button class="submit-btn" type="submit">Record Weight</button>
    </form>
  </section>

  <div id="message"></div>

  <script src="script.js"></script>
</body>
</html>
